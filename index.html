<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayten & Kadir</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfaf6;
    color: #444;
    text-align: center;
}

.section {
    padding: 60px 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: 1s ease;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.9)),
    url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1600') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.countdown {
    font-size: 24px;
    margin-top: 20px;
}

.program {
    max-width: 400px;
    margin: auto;
    text-align: left;
}

.program p {
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    border: none;
    background: #e8d8c3;
    cursor: pointer;
    border-radius: 20px;
    margin-top: 20px;
}

</style>
</head>

<body>

<!-- Müzik -->
<audio id="music" loop>
  <source src="https://www.myinstants.com/media/sounds/imperial-march-star-wars.mp3" type="audio/mp3">
</audio>

<div class="hero section show">
    <h1>Ayten & Kadir</h1>
    <h2>Nişanımıza Davetlisiniz</h2>
    <p>18 Nisan 2026 • 18:00</p>

    <div class="countdown" id="countdown"></div>

    <button onclick="playMusic()">Müziği Başlat</button>
</div>

<div class="section">
    <h1>Program</h1>
    <div class="program">
        <p>18:00 – Başlangıç</p>
        <p>19:00 – İsteme</p>
        <p>20:00 – Yemek</p>
        <p>21:00 – Bitiş</p>
    </div>
</div>

<div class="section">
    <h1>Mekan</h1>
    <p>Meydan Pera Davet Evi</p>
    <iframe src="https://www.google.com/maps?q=Meydan+Pera+Davet+Evi&output=embed"></iframe>
</div>

<div class="section">
    <h1>Biz</h1>
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800" width="80%" style="border-radius: 20px;">
</div>

<script>

// Scroll animasyon
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            sec.classList.add('show');
        }
    });
});

// Countdown
const countdown = () => {
    const target = new Date("2026-04-18T18:00:00").getTime();
    const now = new Date().getTime();
    const diff = target - now;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerHTML =
        days + " gün " + hours + " saat " + minutes + " dakika";
}

setInterval(countdown, 1000);

// Müzik
function playMusic(){
    document.getElementById("music").play();
}

</script>

</body>
</html>
