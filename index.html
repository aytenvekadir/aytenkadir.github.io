<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayten & Kadir</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfaf6;
    color: #444;
    text-align: center;
    overflow-x: hidden;
    overflow: hidden;
    height: 100%;
}

#intro {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #fdfaf6, #fff1e6);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
    transition: opacity 0.8s ease;
}

#intro button {
    padding: 12px 30px;
    border: none;
    background: #e8d8c3;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
}
#intro button:hover {
    transform: scale(1.1);
    background: #f7e6d0;
}

.typing {
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #444;
    width: 0;
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    animation: typing 3s steps(30,end) forwards, blink .8s infinite;
    margin-bottom: 10px;
}
.typing2 {
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #444;
    width: 0;
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    animation: typing2 2s steps(30,end) forwards, blink2 .8s infinite;
    margin-bottom: 20px;
}
@keyframes typing { to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }
@keyframes typing2 { to { width: 100%; } }
@keyframes blink2 { 50% { border-color: transparent; } }

/* Başlangıçta içerik gizli ve animasyon */
.hero, .section {
    opacity: 0;
    transform: translateY(30px);
    transition: 1s ease;
}
.hero.show, .section.show {
    opacity: 1;
    transform: translateY(0);
}

/* Hero ekran tam boy */
.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.9)),
                url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1600') center/cover;
}

/* Section aralıkları düzeltildi */
.section {
    padding: 50px 20px;
}

h1 { font-family: 'Playfair Display', serif; font-size: 42px; }
.countdown { font-size: 22px; margin-top: 20px; }
.program { max-width: 400px; margin: auto; text-align: left; }
.program p { border-bottom: 1px solid #ddd; padding: 8px 0; }
iframe { width: 100%; height: 300px; border-radius: 10px; border: none; }
.btn {
    display: inline-block;
    padding: 12px 20px;
    background: #e8d8c3;
    border-radius: 20px;
    text-decoration: none;
    color: #333;
    margin-top: 15px;
}
</style>
</head>

<body>

<div id="intro">
    <div class="typing">Ayten & Kadir</div>
    <div class="typing2">Nişanımıza Davetlisiniz</div>
    <button onclick="startSite()">Daveti Aç 💌</button>
</div>

<audio id="music" loop>
  <source src="https://raw.githubusercontent.com/aytenvekadir/aytenkadir.github.io/main/indila-love-story_nys3RcbM.mp3" type="audio/mpeg">
</audio>

<div class="hero section">
    <h1>Ayten & Kadir</h1>
    <p>18 Nisan 2026 • 13:00</p>
    <div class="countdown" id="countdown"></div>
</div>

<div class="section">
    <h1>Program</h1>
    <div class="program">
        <p>13:00 – Başlangıç</p>
        <p>İsteme - Nişan - Yemek</p>
        <p>16:00 – Bitiş</p>
    </div>
</div>

<div class="section">
    <h1>Mekan</h1>
    <p><b>Valeria Davet Evi</b></p>
    <p>Beyaz Residence Muammer Aksoy Cd. 88C<br>
    34295 Küçükçekmece / İstanbul</p>
    <a class="btn" target="_blank" href="https://www.google.com/maps?q=Valeria+Davet+Evi+Beyaz+Residence+Muammer+Aksoy+Cd.+88C+34295+Küçükçekmece+İstanbul">Yol Tarifi Al</a>
    <p style="margin-top:15px;">📞 0551 141 34 83</p>
    <iframe src="https://www.google.com/maps?q=Valeria+Davet+Evi+Beyaz+Residence+Muammer+Aksoy+Cd.+88C+34295+Küçükçekmece+İstanbul&output=embed"></iframe>
</div>

<div class="section">
    <h1>Biz</h1>
    <img src="https://raw.githubusercontent.com/aytenvekadir/aytenkadir.github.io/main/ayten_ve_kadir.jpg" width="80%" style="border-radius:20px;">
</div>

<script>
function startSite() {
    const intro = document.getElementById("intro");
    intro.style.opacity = "0";

    setTimeout(() => {
        intro.style.display = "none";
        const sections = document.querySelectorAll('.hero, .section');
        sections.forEach(sec => sec.classList.add('show'));
        document.body.style.overflow = "auto";
        document.body.style.height = "auto";
        window.scrollTo(0,0);
    }, 500);

    document.getElementById("music").play();
}

const sections = document.querySelectorAll('.section, .hero');
window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            sec.classList.add('show');
        }
    });
});

const countdown = () => {
    const target = new Date("2026-04-18T13:00:00").getTime();
    const now = new Date().getTime();
    const diff = target - now;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerHTML =
        days + " gün " + hours + " saat " + minutes + " dakika";
}
setInterval(countdown, 1000);
</script>

</body>
</html>
