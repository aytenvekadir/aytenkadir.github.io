<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayten & Kadir</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfaf6;
    color: #444;
    text-align: center;
}

/* Giriş ekranı */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #fdfaf6;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

#intro button {
    padding: 12px 25px;
    border: none;
    background: #e8d8c3;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

/* Yazı animasyonu */
.typing {
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #444;
    width: 0;
    animation: typing 3s steps(30, end) forwards, blink .8s infinite;
}

@keyframes typing {
    to { width: 100%; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

.section {
    padding: 60px 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: 1s ease;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.9)),
    url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1600') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
}

.countdown {
    font-size: 22px;
    margin-top: 20px;
}

.program {
    max-width: 400px;
    margin: auto;
    text-align: left;
}

.program p {
    border-bottom: 1px solid #ddd;
    padding: 8px 0;
}

iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
    border: none;
}

.btn {
    display: inline-block;
    padding: 12px 20px;
    background: #e8d8c3;
    border-radius: 20px;
    text-decoration: none;
    color: #333;
    margin-top: 15px;
}

</style>
</head>

<body>

<!-- Giriş ekranı -->
<div id="intro">
    <h2>Ayten & Kadir</h2>
    <button onclick="startSite()">Daveti Aç 💌</button>
</div>

<!-- Müzik -->
<audio id="music" loop>
  <source src="https://www.myinstants.com/media/sounds/imperial-march-star-wars.mp3">
</audio>

<div class="hero section">
    <h1 class="typing">Ayten & Kadir</h1>
    <p>18 Nisan 2026 • 18:00</p>
    <div class="countdown" id="countdown"></div>
</div>

<div class="section">
    <h1>Program</h1>
    <div class="program">
        <p>18:00 – Başlangıç</p>
        <p>19:00 – İsteme</p>
        <p>20:00 – Yemek</p>
        <p>21:00 – Bitiş</p>
    </div>
</div>

<div class="section">
    <h1>Mekan</h1>

    <p><b>Meydan Pera Davet Evi</b></p>
    <p>Halkalı Merkez Mahallesi, 1. İkitelli Caddesi,<br>
    Meydan, Halkalı AVM C No:2/2b,<br>
    Küçükçekmece / İstanbul</p>

    <a class="btn" target="_blank"
    href="https://www.google.com/maps?q=Meydan+Pera+Davet+Evi">
    Yol Tarifi Al
    </a>

    <p style="margin-top:15px;">📞 05XX XXX XX XX</p>

    <iframe src="https://www.google.com/maps?q=Meydan+Pera+Davet+Evi&output=embed"></iframe>
</div>

<div class="section">
    <h1>Biz</h1>
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800" width="80%" style="border-radius:20px;">
</div>

<script>

// intro + müzik
function startSite(){
    document.getElementById("intro").style.display = "none";
    document.getElementById("music").play();
}

// scroll animasyon
const sections = document.querySelectorAll('.section');
window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            sec.classList.add('show');
        }
    });
});

// countdown
const countdown = () => {
    const target = new Date("2026-04-18T18:00:00").getTime();
    const now = new Date().getTime();
    const diff = target - now;

    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff / (1000*60*60)) % 24);
    const minutes = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerHTML =
        days + " gün " + hours + " saat " + minutes + " dakika";
}

setInterval(countdown, 1000);

</script>

</body>
</html>
